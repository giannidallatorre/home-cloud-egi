name: Update Helm Chart

on:
  push:
    branches: [ main ]
    paths:
      - 'chart/**'
  workflow_dispatch: # Allow testing the workflow manually

jobs:
  upgrade-chart:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to allow 'git push' back to the repo
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Lint Helm Chart
        run: helm lint chart/

      - name: Update Chart Version
        id: bump
        run: |
          OLD_VERSION=$(yq eval '.version' chart/Chart.yaml)
          NEW_VERSION=$(echo $OLD_VERSION | awk -F. '{$NF = $NF + 1;} 1' | sed 's/ /./g')
          yq eval ".version = \"$NEW_VERSION\"" -i chart/Chart.yaml
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chart/Chart.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: bump helm chart to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

  deploy-chart:
    needs: upgrade-chart # Only deploy after the version is bumped
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Deploy to Kubernetes
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "::error::KUBECONFIG secret is missing or empty. Please add it to your GitHub Repository Secrets."
            exit 1
          fi

          # 1. Create a temporary kubeconfig file from the secret
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          export KUBECONFIG=~/.kube/config

          # 2. Run the deployment with BEST PRACTICE flags:
          helm upgrade --install homepage ./chart \
            --kubeconfig ~/.kube/config \
            -f ./chart/values.yaml \
            -n torre-ns \
            --rollback-on-failure \
            --wait \
            --timeout 5m
