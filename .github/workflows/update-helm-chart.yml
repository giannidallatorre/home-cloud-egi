name: Deploy Helm Chart

on:
  push:
    branches: [ main ]
    paths:
      - 'chart/**'
  workflow_dispatch: # Allow testing the workflow manually

jobs:
  deploy-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Lint Helm Chart
        run: helm lint chart/

      - name: Get Git Metadata
        id: git
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(git log -1 --format=%cd --date=format:'%b %d, %Y')" >> $GITHUB_OUTPUT

      - name: Deploy to Kubernetes
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -z "$KUBECONFIG_DATA" ]; then
            echo "::error::KUBECONFIG secret is missing or empty. Please add it to your GitHub Repository Secrets."
            exit 1
          fi

          # 1. Create a temporary kubeconfig file from the secret
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          export KUBECONFIG=~/.kube/config

          # 2. Run the deployment with git metadata injected:
          helm upgrade --install homepage ./chart \
            --kubeconfig ~/.kube/config \
            -f ./chart/values.yaml \
            -n torre-ns \
            --set gitSha=${{ steps.git.outputs.sha }} \
            --set-string gitDate="${{ steps.git.outputs.date }}" \
            --rollback-on-failure \
            --wait \
            --timeout 5m
