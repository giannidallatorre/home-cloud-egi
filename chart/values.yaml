  custom.js: |
    // Wait for the DOM to be fully loaded
    window.addEventListener("load", function() {
      // Find the main footer container
      const footer = document.getElementById("footer");
      if (!footer) return;

      // Find the version wrapper div (which flexes justify-end by default)
      const flexWrapperPattern = "flex mt-4 w-full justify-end";
      const outerVersionDiv = Array.from(footer.getElementsByTagName('div')).find(div => 
        div.className.includes("flex mt-4 w-full")
      );

      if (outerVersionDiv) {
        // Change from end-alignment to space-between formatting
        outerVersionDiv.classList.remove('justify-end');
        outerVersionDiv.classList.add('justify-between');

        // Create our new EGI Revision left element
        const egiRevisionDiv = document.createElement("div");
        egiRevisionDiv.className = "flex flex-row items-center";
        
        // Exact same HTML classes as the right side, just different text/link
        egiRevisionDiv.innerHTML = `
          <span class="text-xs text-theme-500 dark:text-theme-400">
            <a href="https://github.com/giannidallatorre/egi-services" target="_blank" rel="noopener noreferrer" class="mr-2 text-xs text-theme-500 dark:text-theme-400 flex flex-row items-center">EGI Revision: {{ .Values.gitSha }} ({{ .Values.gitDate }})</a>
          </span>
        `;
        
        // Insert it as the first element in the wrapper (pushing it to the left)
        outerVersionDiv.insertBefore(egiRevisionDiv, outerVersionDiv.firstChild);
      }

      // Hide the color picker button (v1.11.0 compatibility since aria-labels changed)
      document.querySelectorAll('button').forEach(btn => {
        if (btn.textContent.includes('Change color')) {
          btn.style.display = 'none';
        }
      });
    });


  custom.css: |
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap');

    :root {
      --egi-blue: #005FAA;
      --egi-orange: #EF8200;
      --egi-dark-blue: #1E325C;
      --egi-light-gray: #F7F6F7;
      --egi-dark-gray: #454649;
      --egi-border-gray: #E4E4E4;
    }

    html {
      font-size: 22px !important; /* Increased font size for better visibility */
    }

    body {
      font-family: 'DM Sans', sans-serif !important;
      -webkit-font-smoothing: antialiased;
    }

    /* Force EGI Branding & High Contrast */
    .light body {
      background-color: #ffffff !important;
      color: var(--egi-dark-gray) !important;
    }

    .light h1, .light h2, .light h3, .light h4, .light .header-anchor {
      color: var(--egi-blue) !important;
    }

    .dark body {
      background-color: var(--egi-dark-blue) !important;
      color: #ffffff !important;
    }

    /* Ensure Theme Toggle is prominent */
    button[title*="Theme"], button[aria-label*="Theme"], .theme-toggle {
      display: inline-flex !important;
      visibility: visible !important;
      opacity: 1 !important;
    }

    /* Group Headers */
    .group-header h2 {
      border-bottom: 3px solid var(--egi-orange) !important;
      padding-bottom: 0.5rem !important;
      margin-bottom: 1.5rem !important;
      font-weight: 700 !important;
      font-size: 1.7rem !important; /* Larger headers */
    }

    /* Cards */
    .card {
      border: 1px solid var(--egi-border-gray) !important;
      border-radius: 6px !important;
    }

    .light .card {
      background-color: var(--egi-light-gray) !important;
    }

    .dark .card {
      background-color: rgba(255, 255, 255, 0.05) !important;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar-thumb {
      background: var(--egi-blue) !important;
    }

  kubernetes.yaml: |
    mode: cluster

image:
  registry: ghcr.io
  repository: gethomepage/homepage
  pullPolicy: IfNotPresent
  tag: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    - secretName: homepage-dyn-cloud-e-infra-cz-tls
      hosts:
        # - home.cloud.egi.eu
        - homepage.dyn.cloud.e-infra.cz
  hosts:
    - host: homepage.dyn.cloud.e-infra.cz
      paths:
        - path: /
          pathType: Prefix

rbac:
  enabled: false

serviceAccount:
  create: false
  name: homepage

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  privileged: false
  runAsUser: 1000
  runAsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

gitSha: "local"
gitDate: "dev"
